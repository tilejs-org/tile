name: Auto Release (Main)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 pega versão direto do package.json (SEM API)
      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 🔥 pega último commit
      - name: Get last commit
        id: commit
        run: |
          MESSAGE=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          HASH=$(git rev-parse --short HEAD)

          # suporte a multiline safe
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      # 🔥 gera release body (SEM mudar sua estrutura)
      - name: Generate release body
        run: |
          echo "${{ steps.commit.outputs.message }}" > release.md
          echo "" >> release.md

          echo "**Author:** ${{ steps.commit.outputs.author }}" >> release.md
          echo "" >> release.md

          echo "**Hash:** ${{ steps.commit.outputs.hash }}" >> release.md

      # 🔥 cria release no GitHub
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release.md