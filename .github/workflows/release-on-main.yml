name: Auto Release (Main)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 PRIMEIRO: pega commit (independente da API)
      - name: Get last commit
        id: commit
        run: |
          MESSAGE=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          HASH=$(git rev-parse --short HEAD)

          # EOF delimiter para valores multilinhas
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      # 🔥 SEGUNDO: espera API estar pronta (MUDOU A PRIORIDADE)
      - name: Wait API ready
        run: |
          for i in {1..15}; do
            VERSION=$(curl -s https://api-tilejs.vercel.app/versions/root | jq -r '.version')

            if [ "$VERSION" != "null" ] && [ "$VERSION" != "" ]; then
              echo "API ready: $VERSION"
              exit 0
            fi

            echo "Waiting API..."
            sleep 3
          done

          echo "API not ready"
          exit 1

      # 🔥 TERCEIRO: agora sim pega versão
      - name: Get version from API
        id: version
        run: |
          VERSION=$(curl -s https://api-tilejs.vercel.app/versions/root | jq -r '.version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 🔥 QUARTO: gera exatamente seu release.md (NÃO ALTERADO)
      - name: Generate release body
        run: |
          echo "${{ steps.commit.outputs.message }}" >> release.md
          echo "" >> release.md

          echo "**Author:** ${{ steps.commit.outputs.author }}" >> release.md
          echo "" >> release.md

          echo "**Hash:** ${{ steps.commit.outputs.hash }}" >> release.md
          echo "" >> release.md

      # 🔥 QUINTO: cria release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release.md